name: ASSDraw3 Ultimate Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-20.04

    steps:
    - name: Repo'yu Klonla
      uses: actions/checkout@v4

    - name: Bağımlılıkları Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libtool pkg-config libagg-dev libwxgtk3.0-gtk3-dev

    - name: Kodu Python ile Otomatik Yamala (Regex)
      run: |
        python3 -c "
        import re
        
        # 1. assdraw.cpp yaması (wxWidgets sürüm uyuşmazlığı)
        with open('src/assdraw.cpp', 'r', encoding='latin-1') as f:
            data = f.read()
        data = data.replace('FromDIP(wxSize(640, 480))', 'wxSize(640, 480)')
        with open('src/assdraw.cpp', 'w', encoding='latin-1') as f:
            f.write(data)
            
        # 2. canvas.cpp yaması (Geliştiricinin orijinal kodda unuttuğu parantezi zorla ekler)
        with open('src/canvas.cpp', 'r', encoding='latin-1') as f:
            data = f.read()
        
        # Ne kadar satır boşluğu/tab olursa olsun ilgili if bloğunu bulur ve süslü parantez ekler
        data = re.sub(r'(if\s*\(\s*pointedAt_point->type\s*==\s*MP\s*&&\s*pointedAt_point->cmd_next\s*\))\s*if', r'\1 { if', data)
        
        with open('src/canvas.cpp', 'w', encoding='latin-1') as f:
            f.write(data)
        "

    - name: Autotools Yapılandırması
      run: |
        mkdir -p m4
        autoreconf -vfi -I m4
        ./configure CXXFLAGS="-std=gnu++98 -Wno-narrowing -Wno-deprecated-declarations -g -O2" CFLAGS="-g -O2"

    - name: Derlemeyi Başlat
      run: |
        make -j$(nproc)

    - name: Dosyayı Çıkar
      uses: actions/upload-artifact@v4
      with:
        name: assdraw-linux
        path: src/assdraw
