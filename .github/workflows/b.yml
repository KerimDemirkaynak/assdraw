name: Build ASSDraw3

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Ensure AGG Submodule Exists (Fallback Clone)
      run: |
        if (-not (Test-Path "vendor/agg/agg-src/include/agg_basics.h")) {
            Write-Host "Alt modul eksik! Git submodules atlanarak manuel klonlaniyor..."
            if (Test-Path "vendor/agg") { Remove-Item -Recurse -Force "vendor/agg" }
            git clone https://github.com/ghaerr/agg-2.6.git vendor/agg
            Set-Location vendor/agg
            git checkout c4f36b4432142f22c0bf82c6fbdb41567a236be2
            Set-Location ../..
        }
      shell: pwsh

    - name: Cache vcpkg archives
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\vcpkg\archives
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Set VCPKG_ROOT
      run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Build with PowerShell helper
      run: .\build\build-win-vcpkg.ps1 -Fresh
      shell: pwsh

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: assdraw3-windows
        path: |
          build-dir\Release\assdraw3.exe
          build-dir\Release\*.dll

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Ensure AGG Submodule Exists (Fallback Clone for Linux)
      run: |
        if [ ! -f "vendor/agg/agg-src/include/agg_basics.h" ]; then
            echo "Alt modul eksik! Manuel klonlaniyor..."
            rm -rf vendor/agg
            git clone https://github.com/ghaerr/agg-2.6.git vendor/agg
            cd vendor/agg
            git checkout c4f36b4432142f22c0bf82c6fbdb41567a236be2
            cd ../..
        fi
      shell: bash

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libopengl-dev libglx-dev libegl-dev pkg-config ninja-build build-essential autoconf autoconf-archive automake libtool gperf

    - name: Cache vcpkg archives
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg/archives
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Configure CMake
      run: |
        cmake -B build-dir -S . \
          -GNinja \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DVCPKG_TARGET_TRIPLET=x64-linux

    - name: Build
      run: cmake --build build-dir --config Release

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: assdraw3-linux
        path: build-dir/assdraw3
