name: Build ASSDraw

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
    # 1. Kodu GitHub sanal makinesine çeker
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Gerekli derleyici ve kütüphaneleri (wxWidgets ve AGG) kurar
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libwxgtk3.2-dev libagg-dev pkg-config

# 3. Koddaki hataları 'sed' ile otomatik olarak yamalar (Düzenler)
    - name: Patch Source Code (Auto Fix)
      run: |
        echo "C++ Hataları yamalanıyor..."
        
        # Hata 1: AGG kütüphanesi 3 parametreli rgba_pre fonksiyonunu 4 parametreliye çevirir (1.0 alfa ekler)
        sed -i 's/agg::rgba_pre(0, 0, 0)/agg::rgba_pre(0.0, 0.0, 0.0, 1.0)/g' src/canvas.cpp
        
        # Hata 2: 1870. satırın başına (else kelimesinin öncesine) sadece süslü parantezi ve yeni satırı ekler
        sed -i '1870s/^/}\n/' src/canvas.cpp

    # 4. Kodu yapılandırır ve derler
    - name: Build ASSDraw
      run: |
        chmod +x autogen.sh
        ./autogen.sh
        ./configure CXXFLAGS="-std=c++11"
        make

    # 5. Derlenen dosyayı indirmen için GitHub'a yükler
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASSDraw-Linux
        path: src/assdraw
