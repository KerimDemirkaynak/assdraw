name: Build ASSDraw

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libagg-dev libwxgtk3.2-dev libgtk-3-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Apply patches for modern build
        run: |
          echo "=== Patching configure.in ==="
          sed -i 's/AC_PROG_LIBTOOL/LT_INIT/' configure.in
          sed -i 's/\[std,gl,stc,aui, propgrid\]/[std,gl,aui]/' configure.in
          sed -i 's/AM_PATH_WXCONFIG(2.8.1/AM_PATH_WXCONFIG(3.0.0/' configure.in

          echo "=== Patching canvas.cpp - AGG rgba_pre fix ==="
          sed -i 's/agg::rgba_pre(0, 0, 0)/agg::rgba_pre(0, 0, 0, 1.0)/' src/canvas.cpp

          echo "=== Patching canvas.cpp - WXK_TAB bug fix ==="
          # Eski hatalı bloğu silip doğru haliyle değiştiriyoruz
          cat > /tmp/tab_fix.patch << 'EOF'
--- src/canvas.cpp
+++ src/canvas.cpp
@@ -1861,23 +1861,27 @@
                 }
                 else
                 {
-                    Point *warpto = NULL;
-                    if (pointedAt_point->type == MP && pointedAt_point->cmd_next)
-                        if (pointedAt_point->cmd_next->controlpoints.size() > 0)
-                            warpto = pointedAt_point->cmd_next->controlpoints.front();
-                        else
-                            warpto = pointedAt_point->cmd_next->m_point;
-                    }
-                    else
+                    Point *warpto = NULL;
+                    if (pointedAt_point->type == MP && pointedAt_point->cmd_next)
                     {
-                        PointList::iterator it = pointedAt_point->cmd_main->controlpoints.begin();
-                        while (*it != pointedAt_point) it++;
-                        it++;
-                        if (it == pointedAt_point->cmd_main->controlpoints.end())
-                            warpto = pointedAt_point->cmd_main->m_point;
-                        else
-                            warpto = *it;
+                        if (pointedAt_point->cmd_next->controlpoints.size() > 0)
+                            warpto = pointedAt_point->cmd_next->controlpoints.front();
+                        else
+                            warpto = pointedAt_point->cmd_next->m_point;
                     }
+                    else
+                    {
+                        PointList::iterator it = pointedAt_point->cmd_main->controlpoints.begin();
+                        while (*it != pointedAt_point) it++;
+                        it++;
+                        if (it == pointedAt_point->cmd_main->controlpoints.end())
+                            warpto = pointedAt_point->cmd_main->m_point;
+                        else
+                            warpto = *it;
+                    }
                     if (warpto == NULL)
                         warpto = cmds.front()->m_point;
                     wxPoint point = warpto->ToWxPoint();
                     WarpPointer(point.x, point.y);
                 }
             }
EOF
          patch -p0 < /tmp/tab_fix.patch

      - name: Build
        run: |
          chmod +x autogen.sh
          ./autogen.sh
          
          ./configure \
            CXXFLAGS="-std=c++14 -Wno-deprecated-declarations -Wno-unused-result -O2 -fpermissive" \
            --disable-debug
          
          make -j$(nproc)

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: ASSDraw-Linux
          path: src/assdraw
          if-no-files-found: error
