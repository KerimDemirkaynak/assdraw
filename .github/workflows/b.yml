name: Build ASSDraw

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libwxgtk3.2-dev libagg-dev pkg-config

    - name: Patch Source Code (Auto Fix)
      run: |
        echo "C++ Hataları güvenli bir şekilde yamalanıyor..."
        
        # 1. Hata: AGG kütüphanesi sürüm farkı yaması (sed burada güvenli)
        sed -i 's/agg::rgba_pre(0, 0, 0)/agg::rgba_pre(0.0, 0.0, 0.0, 1.0)/g' src/canvas.cpp
        
        # 2. Hata: Eksik parantez yaması (sed yerine Python kullanarak satırları %100 garantili değiştiriyoruz)
        python3 -c '
        with open("src/canvas.cpp", "r", encoding="utf-8") as f:
            lines = f.read().splitlines()

        replacement = [
            "                        }",
            "                        else",
            "                        {",
            "                                warpto = pointedAt_point->cmd_main->m_point;",
            "                        }",
            "                        if (warpto == NULL)",
            "                        {",
            "                                wxPoint point = warpto->ToWxPoint();",
            "                                warpto = NULL;",
            "                        }",
            "                        break;",
            "                default:",
            "                        break;",
            "        }"
        ]

        # 1870. satırdan 1892. satıra kadar olan kısmı temiz yapıyla değiştir
        lines[1869:1892] = replacement

        with open("src/canvas.cpp", "w", encoding="utf-8") as f:
            f.write("\n".join(lines) + "\n")
        '

    - name: Build ASSDraw
      run: |
        chmod +x autogen.sh
        ./autogen.sh
        ./configure CXXFLAGS="-std=c++11"
        make

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASSDraw-Linux
        path: src/assdraw
