name: Build ASSDraw

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (Ubuntu Latest)
    runs-on: ubuntu-24.04   # Daha yeni, wxWidgets 3.2 desteği iyi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libagg-dev \
            libwxgtk3.2-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Patch configure.in for modern systems
        run: |
          # AC_PROG_LIBTOOL → LT_INIT
          sed -i 's/AC_PROG_LIBTOOL/LT_INIT/' configure.in
          
          # wxWidgets modülleri (propgrid eskidi)
          sed -i 's/\[std,gl,stc,aui, propgrid\]/[std,gl,aui]/' configure.in
          
          # Minimum wx versiyonu
          sed -i 's/AM_PATH_WXCONFIG(2.8.1/AM_PATH_WXCONFIG(3.0.0/' configure.in

      - name: Autogen + Configure + Build
        run: |
          chmod +x autogen.sh
          ./autogen.sh
          
          ./configure \
            CXXFLAGS="-std=c++14 -Wno-deprecated-declarations -Wno-unused-result -O2" \
            --disable-debug
          
          make -j$(nproc)

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: ASSDraw-Linux
          path: src/assdraw
          if-no-files-found: error

  build-windows-msys2:
    name: Windows (MSYS2 MinGW)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-wxWidgets
            mingw-w64-x86_64-libagg
            mingw-w64-x86_64-autotools

      - name: Build on MSYS2
        run: |
          chmod +x autogen.sh
          ./autogen.sh
          
          ./configure \
            CXXFLAGS="-std=c++14 -Wno-deprecated-declarations" \
            --disable-debug
          
          make -j2

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: ASSDraw-Windows
          path: src/assdraw.exe
