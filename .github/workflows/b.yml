name: Build ASSDraw3

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set VCPKG_ROOT
      run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Build with PowerShell helper
      run: .\build\build-win-vcpkg.ps1 -Fresh
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: assdraw3-release
        path: build-dir\Release\assdraw3.exe
