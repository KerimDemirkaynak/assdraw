name: Build ASSDraw

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libwxgtk3.2-dev libagg-dev pkg-config

    - name: Patch Source Code (Auto Fix)
      run: |
        echo "Applying precise C++ fixes..."
        
        # Fix 1: AGG alpha parameter
        sed -i 's/agg::rgba_pre(0, 0, 0)/agg::rgba_pre(0.0, 0.0, 0.0, 1.0)/g' src/canvas.cpp
        
        # Fix 2: Define 'warpto' at the start of the case block (around line 1827)
        # We find the case WXK_TAB and insert the declaration right after it.
        sed -i '/case WXK_TAB:/a \t\t\t\t\tASSDrawPoint *warpto = NULL;' src/canvas.cpp
        
        # Fix 3: Insert the missing closing bracket before the 'else' on line 1870
        # Since we added a line above, the 'else' is now on line 1871.
        sed -i '/else/i \t\t\t\t\t}' src/canvas.cpp

    - name: Build ASSDraw
      run: |
        chmod +x autogen.sh
        ./autogen.sh
        ./configure CXXFLAGS="-std=c++11"
        make

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ASSDraw-Linux
        path: src/assdraw
