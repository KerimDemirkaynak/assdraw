name: Build ASSDraw

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libagg-dev libwxgtk3.2-dev libgtk-3-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Auto Patch for Modern Systems
        run: |
          echo "=== Patching configure.in ==="
          sed -i 's/AC_PROG_LIBTOOL/LT_INIT/' configure.in
          sed -i 's/\[std,gl,stc,aui, propgrid\]/[std,gl,aui]/' configure.in
          sed -i 's/AM_PATH_WXCONFIG(2.8.1/AM_PATH_WXCONFIG(3.0.0/' configure.in
          
          echo "=== Patching canvas.cpp (AGG rgba_pre + TAB key bug) ==="
          # AGG rgba_pre hatası
          sed -i 's/agg::rgba_pre(0, 0, 0)/agg::rgba_pre(0, 0, 0, 1.0)/' src/canvas.cpp
          
          # TAB tuşu parantez ve scope hatası düzeltmesi
          sed -i '/case WXK_TAB:/,/break;/c\ 
case WXK_TAB:\
    if (mousedownAt_point == NULL && !IsTransformMode() && cmds.size() > 0)\
    {\
        if (pointedAt_point == NULL)\
        {\
            Point *nearest = NULL;\
            double dist = 1e9;\
            for (DrawCmdList::iterator it = cmds.begin(); it != cmds.end(); ++it)\
            {\
                PointList::iterator it2 = (*it)->controlpoints.begin();\
                while (it2 != (*it)->controlpoints.end())\
                {\
                    double distance = Distance((*it2)->ToWxPoint(), wxGetMousePosition() - m_frame->GetPosition() - wxPoint(m_frame->sizes.originx, m_frame->sizes.originy));\
                    if (distance < dist)\
                    {\
                        nearest = (*it2);\
                        dist = distance;\
                    }\
                    it2++;\
                }\
                it++;\
            }\
            if (nearest != NULL)\
            {\
                wxPoint point = nearest->ToWxPoint();\
                WarpPointer(point.x, point.y);\
            }\
        }\
        else\
        {\
            Point *warpto = NULL;\
            if (pointedAt_point->type == MP && pointedAt_point->cmd_next)\
            {\
                if (pointedAt_point->cmd_next->controlpoints.size() > 0)\
                    warpto = pointedAt_point->cmd_next->controlpoints.front();\
                else\
                    warpto = pointedAt_point->cmd_next->m_point;\
            }\
            else\
            {\
                PointList::iterator it = pointedAt_point->cmd_main->controlpoints.begin();\
                while (*it != pointedAt_point) it++;\
                it++;\
                if (it == pointedAt_point->cmd_main->controlpoints.end())\
                    warpto = pointedAt_point->cmd_main->m_point;\
                else\
                    warpto = *it;\
            }\
            if (warpto == NULL)\
                warpto = cmds.front()->m_point;\
            wxPoint point = warpto->ToWxPoint();\
            WarpPointer(point.x, point.y);\
        }\
    }\
    break;' src/canvas.cpp

      - name: Build
        run: |
          chmod +x autogen.sh
          ./autogen.sh
          
          ./configure \
            CXXFLAGS="-std=c++14 -Wno-deprecated-declarations -Wno-unused-result -O2" \
            --disable-debug
          
          make -j$(nproc)

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: ASSDraw-Linux
          path: src/assdraw
          if-no-files-found: error
