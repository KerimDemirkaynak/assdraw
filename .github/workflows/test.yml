name: ASSDraw3 Perfect Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04

    steps:
    - name: Repo'yu Klonla
      uses: actions/checkout@v4

    - name: Gerekli Bağımlılıkları Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libagg-dev \
          libwxgtk3.0-gtk3-dev \
          dos2unix

    - name: Kaynak Kod Hatalarını Otomatik Yamala (Auto-Patch)
      run: |
        # Satır sonu karakteri (CRLF -> LF) uyuşmazlıklarını çözer
        dos2unix src/assdraw.cpp src/canvas.cpp
        
        # 1. HATA ÇÖZÜMÜ: assdraw.cpp içindeki wxWidgets 3.0 uyumsuz FromDIP fonksiyonunu kaldırır
        sed -i 's/FromDIP(wxSize(640, 480))/wxSize(640, 480)/g' src/assdraw.cpp
        
        # 2. HATA ÇÖZÜMÜ: canvas.cpp içindeki eksik süslü parantezi otomatik ekler
        sed -i 's/if (pointedAt_point->type == MP && pointedAt_point->cmd_next)/if (pointedAt_point->type == MP \&\& pointedAt_point->cmd_next) {/g' src/canvas.cpp

    - name: Autotools'u Hazırla
      run: |
        # autogen.sh yerine modern ve güvenilir yapılandırmayı kullan
        mkdir -p m4
        autoreconf -vfi -I m4

    - name: Configure (C++98 ve Hata Yoksayma Zorlaması)
      run: |
        # Modern GCC'nin eski kodda patlamasını engellemek için eski standartları zorluyoruz
        ./configure \
          CXXFLAGS="-std=gnu++98 -Wno-narrowing -Wno-deprecated-declarations -g -O2" \
          CFLAGS="-g -O2"

    - name: Derlemeyi Başlat (Make)
      run: |
        make -j$(nproc)

    - name: Derlenen Çalıştırılabilir Dosyayı Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: assdraw-linux-executable
        path: src/assdraw
