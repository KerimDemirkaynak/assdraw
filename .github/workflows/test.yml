name: ASSDraw3 Perfect Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04

    steps:
    - name: Repo'yu Klonla
      uses: actions/checkout@v4

    - name: Gerekli Bağımlılıkları Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libagg-dev \
          libwxgtk3.0-gtk3-dev

    - name: Kaynak Kod Hatalarını Otomatik Yamala (Python)
      run: |
        python3 -c "
        # 1. assdraw.cpp yaması (wxWidgets sürüm hatası)
        with open('src/assdraw.cpp', 'r', encoding='utf-8', errors='ignore') as f:
            data = f.read()
        data = data.replace('FromDIP(wxSize(640, 480))', 'wxSize(640, 480)')
        with open('src/assdraw.cpp', 'w', encoding='utf-8') as f:
            f.write(data)
            
        # 2. canvas.cpp yaması (Geliştiricinin unuttuğu eksik parantez)
        with open('src/canvas.cpp', 'r', encoding='utf-8', errors='ignore') as f:
            data = f.read()
        target = 'if (pointedAt_point->type == MP && pointedAt_point->cmd_next)'
        data = data.replace(target, target + ' {')
        with open('src/canvas.cpp', 'w', encoding='utf-8') as f:
            f.write(data)
        "

    - name: Autotools'u Hazırla
      run: |
        mkdir -p m4
        autoreconf -vfi -I m4

    - name: Configure (C++98 ve Hata Yoksayma Zorlaması)
      run: |
        ./configure \
          CXXFLAGS="-std=gnu++98 -Wno-narrowing -Wno-deprecated-declarations -g -O2" \
          CFLAGS="-g -O2"

    - name: Derlemeyi Başlat (Make)
      run: |
        make -j$(nproc)

    - name: Derlenen Çalıştırılabilir Dosyayı Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: assdraw-linux-executable
        path: src/assdraw
