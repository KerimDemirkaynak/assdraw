name: Build ASSDraw3

on:
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Bu parametre sayesinde Actions sekmesinden manuel tetikleyebilirsin.

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Ensure AGG Submodule Exists (Fallback Clone)
      run: |
        if (-not (Test-Path "vendor/agg/agg-src/include/agg_basics.h")) {
            Write-Host "Alt modul eksik! Git submodules atlanarak manuel klonlaniyor..."
            if (Test-Path "vendor/agg") { Remove-Item -Recurse -Force "vendor/agg" }
            git clone https://github.com/ghaerr/agg-2.6.git vendor/agg
            Set-Location vendor/agg
            git checkout c4f36b4432142f22c0bf82c6fbdb41567a236be2
            Set-Location ../..
        }
      shell: pwsh

    - name: Cache vcpkg archives
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\vcpkg\archives
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Set VCPKG_ROOT
      run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Build with PowerShell helper
      run: .\build\build-win-vcpkg.ps1 -Fresh
      shell: pwsh

    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
      shell: pwsh

    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: ASSDraw3-Windows-Setup
        path: installer\ASSDraw3_Setup.exe
